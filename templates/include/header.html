<!-- 
    'BilimNazoratchi' Loyihasi - Tepadagi asosiy menyu (Header/Navbar)
    Ushbu fayl foydalanuvchi tizimda kim ekanligini ko'rsatadi va navigatsiyani ta'minlaydi.
-->
{% load static %}

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        
        <!-- SAYT LOGOTIPI VA NOMI -->
        <a class="navbar-brand fw-bold d-flex align-items-center" href="{% if user.is_authenticated %}{% url 'talim:bosh_sahifa' %}{% else %}{% url 'talim:landing' %}{% endif %}">
            <!-- 1-talaba yuklagan logo.png chaqiriladi -->
            <img src="{% static 'img/logo.png' %}" alt="Logo" width="40" height="40" class="me-2 rounded-circle bg-light p-1 shadow-sm">
            <span style="color: var(--em-blue); letter-spacing: 0.5px;">BILIM</span><span style="color: #334155;">NAZORATCHI</span>
        </a>

        <!-- MOBIL QURILMALAR UCHUN "BURGER" MENYU -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#bilimNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- ASOSIY MENYU ELEMENTLARI -->
        <div class="collapse navbar-collapse" id="bilimNavbar">
            <ul class="navbar-nav ms-auto align-items-center">
                
                {% if user.is_authenticated %}
                    <!-- FOYDALANUVCHI TIZIMGA KIRGAN BO'LSA -->
                    <li class="nav-item me-3">
                        <div class="d-flex align-items-center bg-light px-3 py-1 rounded-pill border">
                            <!-- Foydalanuvchi roli va ismi -->
                            <i class="bi bi-person-circle text-primary me-2 fs-5"></i>
                            <div class="text-start">
                                <span class="d-block fw-bold small text-dark" style="line-height: 1.2;">
                                    {{ user.get_full_name|default:user.username }}
                                </span>
                                <span class="badge bg-primary-subtle text-primary p-0 small" style="font-size: 10px; text-transform: uppercase;">
                                    {{ user.get_rol_display }}
                                </span>
                            </div>
                        </div>
                    </li>

                    <!-- PROFILNI TAHRIRLASH (hamma foydalanuvchi uchun) -->
                    <li class="nav-item me-2">
                        <a class="btn btn-sm btn-outline-primary px-3 rounded-pill fw-bold" href="{% url 'hisoblar:shaxsiy_profil_tahrir' %}">
                            <i class="bi bi-pencil-square me-1"></i> Profil
                        </a>
                    </li>

                    <!-- TIZIMDAN CHIQISH TUGMASI (Xavfsiz POST metodi orqali) -->
                    <li class="nav-item">
                        <form action="{% url 'hisoblar:logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-outline-danger px-3 rounded-pill fw-bold">
                                <i class="bi bi-box-arrow-right me-1"></i> Chiqish
                            </button>
                        </form>
                    </li>

                {% else %}
                    <!-- FOYDALANUVCHI TIZIMGA KIRMAGAN BO'LSA -->
                    <li class="nav-item">
                        <a class="btn btn-em-primary px-4 rounded-pill fw-bold shadow-sm" href="{% url 'hisoblar:login' %}">
                            <i class="bi bi-box-arrow-in-right me-1"></i> TIZIMGA KIRISH
                        </a>
                    </li>
                {% endif %}

            </ul>
        </div>
    </div>
</nav>
