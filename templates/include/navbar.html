{% load static %}

<!--
  'BilimNazoratchi' Loyihasi - Asosiy Navigatsiya Paneli (Navbar)
  Vazifasi: Foydalanuvchi tizimda kimligini ko'rsatish va sahifalararo o'tishni ta'minlash.
-->

<nav class="navbar navbar-expand-lg navbar-em shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-dark bn-brand"
       href="{% if user.is_authenticated %}{% url 'talim:bosh_sahifa' %}{% else %}{% url 'talim:landing' %}{% endif %}">
      <img src="{% static 'img/logo.png' %}" alt="Logo" width="40" height="40"
           class="me-2 rounded-circle bg-light p-1 shadow-sm">
      <span class="bn-brand-a">BILIM</span><span class="bn-brand-b">NAZORATCHI</span>
    </a>

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#bilimNavbar"
            aria-controls="bilimNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="bilimNavbar">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <a class="nav-link text-dark fw-bold d-flex align-items-center" href="{% url 'talim:landing' %}">
            <i class="bi bi-house-door me-1"></i>
            BOSH SAHIFA
          </a>
        </li>

        {% if user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link text-dark fw-bold d-flex align-items-center" href="{% url 'talim:haftalik_dars_jadvali' %}">
              <i class="bi bi-calendar-week me-1"></i>
              DARS JADVALI
            </a>
          </li>

          <li class="nav-item">
            <div class="d-flex align-items-center bg-light px-3 py-1 rounded-pill border shadow-sm">
              <i class="bi bi-person-circle text-primary me-2 fs-5"></i>
              <div class="text-start">
                <span class="d-block fw-bold small text-dark bn-user-name">
                  {{ user.get_full_name|default:user.username }}
                </span>
                <span class="badge bg-primary-subtle text-primary p-0 small bn-role-badge">
                  {{ user.get_rol_display }}
                </span>
              </div>
            </div>
          </li>

          <li class="nav-item">
            <a class="btn btn-sm btn-outline-primary px-4 rounded-pill fw-bold d-flex align-items-center"
               href="{% url 'hisoblar:shaxsiy_profil_tahrir' %}">
              <i class="bi bi-pencil-square me-1"></i>
              Profil
            </a>
          </li>

          <li class="nav-item">
            <form action="{% url 'hisoblar:logout' %}" method="post" class="d-inline">
              {% csrf_token %}
              <button type="submit" class="btn btn-sm btn-outline-danger px-4 rounded-pill fw-bold">
                <i class="bi bi-box-arrow-right"></i>
                Chiqish
              </button>
            </form>
          </li>
        {% else %}
          <li class="nav-item">
            <a class="btn btn-em-primary px-4 rounded-pill fw-bold shadow-sm" href="{% url 'hisoblar:login' %}">
              Kirish
            </a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
